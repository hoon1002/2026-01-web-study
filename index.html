<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 나의 웹 스터디 기록장 🔥</title>
    <!-- Web Font: Pretendard -->
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Custom Cursor -->
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <!-- Animated Ambient Background -->
    <div class="ambient-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <div class="container">
        <!-- Sidebar / Header & Form -->
        <aside class="sidebar">
            <header class="glass-panel" data-tilt data-tilt-glare data-tilt-max-glare="0.2">
                <div class="header-icon pulse-animation">🚀</div>
                <h1 class="gradient-text">웹 마스터 여정</h1>
                <p>프론트엔드 성장 일지</p>
                <div class="stats-container">
                    <div class="stat-box">
                        <i data-lucide="book-open" class="stat-icon"></i>
                        <span class="stat-value" id="total-records">2</span>
                        <span class="stat-label">기록됨</span>
                    </div>
                    <div class="stat-box">
                        <i data-lucide="flame" class="stat-icon" style="color: #f97316;"></i>
                        <span class="stat-value">1</span>
                        <span class="stat-label">진행중</span>
                    </div>
                </div>
            </header>

            <section class="input-section glass-panel">
                <h2>
                    <i data-lucide="sparkles" class="icon animate-spin-slow"></i>
                    새로운 기록
                </h2>
                <form id="record-form">
                    <div class="input-group">
                        <input type="text" id="week-title" placeholder=" " required>
                        <label for="week-title">주차 및 제목 (예: 3주차 JS)</label>
                        <div class="input-glow"></div>
                    </div>
                    <div class="input-group">
                        <input type="text" id="learned-content" placeholder=" " required>
                        <label for="learned-content">핵심 요약</label>
                        <div class="input-glow"></div>
                    </div>
                    <div class="input-group">
                        <textarea id="details-content" placeholder=" " rows="4" required></textarea>
                        <label for="details-content">상세 내용 (엔터로 구분)</label>
                        <div class="input-glow"></div>
                    </div>
                    <button type="submit" class="submit-btn futuristic-btn">
                        <span>기록 폭발시키기 💥</span>
                        <i data-lucide="zap" class="icon-small"></i>
                        <div class="btn-flare"></div>
                    </button>
                </form>
            </section>
        </aside>

        <!-- Main Content: Grid of Records -->
        <main class="records-grid" id="records-container">
            <!-- 2주차 기록 -->
            <article class="week-card glass-panel interactive-card" data-tilt data-tilt-perspective="1000"
                data-tilt-scale="1.02" data-tilt-speed="400" data-tilt-max="5">
                <div class="card-glow"></div>
                <div class="card-content-inner">
                    <div class="card-header">
                        <span class="week-badge badge-upcoming"><i data-lucide="clock" class="badge-icon"></i> 예정</span>
                        <h2>2주차: 웹 기초 다지기</h2>
                    </div>
                    <div class="card-body">
                        <p class="summary">본격적인 프론트엔드 기초 학습</p>
                        <div class="details-wrapper">
                            <div class="details">
                                <ul class="empty-state">
                                    <li>다음 주차 스터디 이후에 화려하게 추가될 예정입니다. ✨</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer">
                        <button type="button" class="toggle-btn" aria-expanded="false">
                            <span class="btn-text">데이터 스캔</span>
                            <i data-lucide="chevron-down" class="btn-icon"></i>
                        </button>
                    </div>
                </div>
            </article>

            <!-- 1주차 기록 -->
            <article class="week-card glass-panel interactive-card" data-tilt data-tilt-perspective="1000"
                data-tilt-scale="1.02" data-tilt-speed="400" data-tilt-max="5">
                <div class="card-glow"></div>
                <div class="card-content-inner">
                    <div class="card-header">
                        <span class="week-badge badge-completed"><i data-lucide="check-circle" class="badge-icon"></i>
                            완료</span>
                        <h2>1주차: 개발 환경 세팅 및 기초</h2>
                    </div>
                    <div class="card-body">
                        <p class="summary">HTML 구조 잡기, CSS 스타일링, GitHub Fork 및 PR</p>
                        <div class="details-wrapper">
                            <div class="details">
                                <ul>
                                    <li>VS Code 설치 및 Live Server 확장 프로그램 활용</li>
                                    <li>Git 기본 명령어 (clone, add, commit, push)</li>
                                    <li>첫 웹페이지 텍스트, 색상, 버튼 문구 변경해보기</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer">
                        <button type="button" class="toggle-btn" aria-expanded="false">
                            <span class="btn-text">데이터 스캔</span>
                            <i data-lucide="chevron-down" class="btn-icon"></i>
                        </button>
                    </div>
                </div>
            </article>
        </main>
    </div>

    <!-- Toast Notifications Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- External Libraries -->
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- Vanilla Tilt -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <!-- Custom Script -->
    <script src="script.js"></script>
</body>

</html>
