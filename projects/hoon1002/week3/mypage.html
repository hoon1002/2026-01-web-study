<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Hobby-in 마이페이지 - 내가 쓴 글과 스크랩한 가이드를 관리하세요.">
  <title>마이페이지 | Hobby-in</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="navbar" id="main-nav"></header>

  <main class="page-content">
    <div class="container">

      <!-- Not logged in -->
      <div id="mypage-login-prompt" style="display:none">
        <div class="empty-state">
          <div class="empty-icon">🔒</div>
          <p>마이페이지를 이용하려면 로그인이 필요합니다.</p>
          <button class="btn btn-primary" onclick="App.showLoginModal(() => window.location.reload())" id="mypage-login-btn">로그인하기</button>
        </div>
      </div>

      <!-- Logged in content -->
      <div id="mypage-content" style="display:none">

        <!-- Profile Section -->
        <div class="card card-glass fade-in" style="display:flex;align-items:center;gap:var(--space-xl);margin-bottom:var(--space-2xl);padding:var(--space-2xl)">
          <div class="profile-avatar" id="mypage-avatar">N</div>
          <div style="flex:1">
            <h1 style="font-size:1.6rem;font-weight:800;margin-bottom:var(--space-xs)" id="mypage-nickname">닉네임</h1>
            <div style="display:flex;align-items:center;gap:var(--space-sm);margin-bottom:var(--space-md)">
              <span class="badge badge-newbie" id="mypage-badge">🌱 뉴비</span>
              <span style="color:var(--text-muted);font-size:0.85rem" id="mypage-joindate">가입일: -</span>
            </div>
            <div style="display:flex;gap:var(--space-md)">
              <button class="btn btn-secondary" style="font-size:0.8rem;padding:6px 14px" onclick="MyPage.toggleRole()" id="mypage-role-btn">🔄 역할 전환</button>
              <button class="btn btn-ghost" style="font-size:0.8rem;padding:6px 14px;color:var(--accent-red)" onclick="App.logout()">로그아웃</button>
            </div>
          </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid fade-in fade-in-delay-1">
          <div class="card stat-card">
            <div class="stat-value" id="stat-guides">0</div>
            <div class="stat-label">작성한 가이드</div>
          </div>
          <div class="card stat-card">
            <div class="stat-value" id="stat-likes">0</div>
            <div class="stat-label">받은 좋아요</div>
          </div>
          <div class="card stat-card">
            <div class="stat-value" id="stat-scraps">0</div>
            <div class="stat-label">스크랩한 글</div>
          </div>
          <div class="card stat-card">
            <div class="stat-value" id="stat-given-likes">0</div>
            <div class="stat-label">누른 좋아요</div>
          </div>
        </div>

        <!-- Tabs -->
        <div class="tabs fade-in fade-in-delay-2" id="mypage-tabs">
          <button class="tab-btn active" id="tab-myguides" onclick="MyPage.switchTab('myguides')">✍️ 내가 쓴 글</button>
          <button class="tab-btn" id="tab-scrapped" onclick="MyPage.switchTab('scrapped')">📌 스크랩한 글</button>
          <button class="tab-btn" id="tab-liked" onclick="MyPage.switchTab('liked')">❤️ 좋아요한 글</button>
        </div>

        <!-- Tab Content -->
        <div id="tab-content">
          <div class="grid grid-3" id="mypage-grid"></div>
          <div class="empty-state" id="mypage-empty" style="display:none">
            <div class="empty-icon" id="empty-icon">📝</div>
            <p id="empty-text">아직 작성한 글이 없습니다.</p>
            <a href="write.html" class="btn btn-primary" id="empty-action">첫 가이드 작성하기</a>
          </div>
        </div>

      </div>

    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-logo">Hobby-in</div>
      <p>초보자를 위한 취미 입문 가이드 플랫폼 ⓒ 2026</p>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/mypage.js"></script>
</body>
</html>
